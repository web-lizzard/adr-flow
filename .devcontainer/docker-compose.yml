services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
      - gcloud-config:/home/vscode/.config/gcloud
      - cursor-plans:/home/vscode/.cursor/plans
    depends_on:
      - redis
      - postgres

  # --- bootstrap-devcontainer service: redis ---
  # Host ports avoid 6379/5432 conflicts; in-container URLs still use redis:6379 / postgres:5432.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6391:6379"

  # --- bootstrap-devcontainer service: postgres ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  gcloud-config:
  cursor-plans:
