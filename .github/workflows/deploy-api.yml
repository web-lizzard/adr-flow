# Deploy adr-flow-api to Cloud Run on merge to main (backend changes).
# Auth: Workload Identity Federation — configure repo variables after deploy/gcp/05-wif-github.sh
#   GCP_PROJECT_ID, GCP_REGION, WIF_PROVIDER, WIF_SERVICE_ACCOUNT
name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/gcp/run-api.flags'
      - 'deploy/gcp/deploy-api.sh'
      - '.github/workflows/deploy-api.yml'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: bash deploy/gcp/deploy-api.sh
