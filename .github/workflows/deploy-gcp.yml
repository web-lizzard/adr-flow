# Deploy adr-flow-api then adr-flow-web to Cloud Run on merge to main.
# Web needs a live API URL for NUXT_API_UPSTREAM; API deploy runs first when both change.
# Auth: Workload Identity Federation — repo variables from deploy/gcp/05-wif-github.sh
#   GCP_PROJECT_ID, GCP_REGION, WIF_PROVIDER, WIF_SERVICE_ACCOUNT
name: Deploy GCP

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/gcp/run-api.flags'
      - 'deploy/gcp/run-web.flags'
      - 'deploy/gcp/deploy-api.sh'
      - 'deploy/gcp/deploy-web.sh'
      - '.github/workflows/deploy-gcp.yml'

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'backend/**'
              - 'deploy/gcp/run-api.flags'
              - 'deploy/gcp/deploy-api.sh'
              - '.github/workflows/deploy-gcp.yml'
            web:
              - 'frontend/**'
              - 'deploy/gcp/run-web.flags'
              - 'deploy/gcp/deploy-web.sh'
              - '.github/workflows/deploy-gcp.yml'

  deploy-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: bash deploy/gcp/deploy-api.sh

  deploy-web:
    needs: [changes, deploy-api]
    if: |
      always() &&
      needs.changes.outputs.web == 'true' &&
      (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_ARTIFACT_REPO: adr-flow
      API_SERVICE: adr-flow-api
      WEB_SERVICE: adr-flow-web
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Build and deploy web service
        working-directory: frontend
        run: |
          set -euo pipefail

          AR_HOST="${GCP_REGION}-docker.pkg.dev"
          AR_IMAGE_PREFIX="${AR_HOST}/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPO}"
          IMAGE="${AR_IMAGE_PREFIX}/${WEB_SERVICE}:${GITHUB_SHA}"

          gcloud auth configure-docker "${AR_HOST}" --quiet

          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"

          API_URL="$(
            gcloud run services describe "${API_SERVICE}" \
              --project="${GCP_PROJECT_ID}" \
              --region="${GCP_REGION}" \
              --format='value(status.url)'
          )"
          if [[ -z "${API_URL}" ]]; then
            echo "error: ${API_SERVICE} is not deployed. Run deploy-api first." >&2
            exit 1
          fi
          API_URL="${API_URL%/}"

          FLAGS_FILE="${GITHUB_WORKSPACE}/deploy/gcp/run-web.flags"
          mapfile -t DEPLOY_FLAGS < <(
            grep -v '^[[:space:]]*#' "${FLAGS_FILE}" | grep -v '^[[:space:]]*$'
          )

          deploy_flag() {
            local name="$1"
            local value="$2"
            local i
            for ((i = 0; i < ${#DEPLOY_FLAGS[@]}; i++)); do
              if [[ "${DEPLOY_FLAGS[i]}" == "${name}"* ]]; then
                DEPLOY_FLAGS[i]="${name}=${value}"
                return
              fi
            done
            DEPLOY_FLAGS+=("${name}=${value}")
          }

          deploy_flag "--region" "${GCP_REGION}"

          gcloud run deploy "${WEB_SERVICE}" \
            --image "${IMAGE}" \
            --project="${GCP_PROJECT_ID}" \
            --set-env-vars="NUXT_API_UPSTREAM=${API_URL}" \
            "${DEPLOY_FLAGS[@]}"

          WEB_URL="$(
            gcloud run services describe "${WEB_SERVICE}" \
              --project="${GCP_PROJECT_ID}" \
              --region="${GCP_REGION}" \
              --format='value(status.url)'
          )"
          echo "Deployed ${WEB_SERVICE}: ${WEB_URL}"
          echo "Smoke: curl ${WEB_URL%/}/api/health"
