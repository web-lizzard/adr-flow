# --- bootstrap-dev-quality pre-commit (v1) ---
default_install_hook_types: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: frontend-prettier
        name: prettier (frontend)
        entry: bash .pre-commit/run-in-frontend.sh ./node_modules/.bin/prettier --check .
        language: system
        pass_filenames: false
        files: ^frontend/
        exclude: ^frontend/(package\.json|pnpm-lock\.yaml)$

      - id: frontend-eslint
        name: eslint (frontend)
        entry: bash .pre-commit/run-in-frontend.sh ./node_modules/.bin/eslint .
        language: system
        pass_filenames: false
        files: ^frontend/
        exclude: ^frontend/(package\.json|pnpm-lock\.yaml)$

      - id: frontend-typecheck
        name: typecheck (frontend)
        entry: bash .pre-commit/run-in-frontend.sh ./node_modules/.bin/tsc --noEmit
        language: system
        pass_filenames: false
        files: ^frontend/
        exclude: ^frontend/(package\.json|pnpm-lock\.yaml)$

      - id: backend-ty
        name: ty check (backend)
        entry: bash -c 'cd backend && uv run ty check'
        language: system
        pass_filenames: false
        files: ^backend/
