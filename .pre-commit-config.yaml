# --- bootstrap-dev-quality pre-commit (v1) ---
default_install_hook_types: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, json, css, markdown]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: frontend-eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && PATH="/usr/local/share/nvm/versions/node/v22.22.3/bin:$PATH" pnpm run lint'
        language: system
        pass_filenames: false
        files: ^frontend/

      - id: frontend-typecheck
        name: typecheck (frontend)
        entry: bash -c 'cd frontend && PATH="/usr/local/share/nvm/versions/node/v22.22.3/bin:$PATH" pnpm run typecheck'
        language: system
        pass_filenames: false
        files: ^frontend/

      - id: backend-ty
        name: ty check (backend)
        entry: bash -c 'cd backend && uv run ty check'
        language: system
        pass_filenames: false
        files: ^backend/
